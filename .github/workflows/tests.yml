name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: raspzan
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d raspzan"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_NAME: RaspZan
      ENVIRONMENT: test
      DEBUG: "true"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/raspzan
      LEGACY_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/2526
      SECRET_KEY: change-me

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run migrations
        run: python -m alembic upgrade head

      - name: Run tests
        run: python -m pytest
