services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: raspzan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d raspzan"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: RaspZan
      ENVIRONMENT: local
      DEBUG: "true"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/raspzan
      LEGACY_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/2526
      SECRET_KEY: change-me
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
